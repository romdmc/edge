name: EDGE Pipeline — Scrape, Analyze, Build & Deploy

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'  # Daily at 6am UTC
  workflow_dispatch:      # Manual trigger

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: https://romdmc.github.io/edge/

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install jinja2 pyyaml requests feedparser youtube-transcript-api openai

      - name: Init database schema
        run: |
          python3 -c "
          from feedback import ensure_feedback_schema
          from auth import init_auth_db
          ensure_feedback_schema('data/edge.db')
          init_auth_db('data/edge.db')
          print('✓ Schema ready')
          "

      - name: Scrape articles
        run: |
          python3 -c "
          from scraper import run_scraper
          stats = run_scraper(config_path='config/sources.yaml', db_path='data/edge.db')
          print(f'Scraped: {stats[\"total_fetched\"]} fetched, {stats[\"total_stored\"]} stored, {stats.get(\"errors\", 0)} errors')
          "

      - name: Analyze articles (LLM)
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: openrouter/owl-alpha
        run: |
          OPENROUTER_API_KEY="${OPENROUTER_API_KEY:-}"
          if [ -z "$OPENROUTER_API_KEY" ]; then
            echo "⚠ No OPENROUTER_API_KEY — skipping LLM analysis (site will use existing data)"
            exit 0
          fi
          python3 -c "
          from analyzer import run_analyzer
          stats = run_analyzer(
              config_path='config/sources.yaml',
              min_score=5.0,
              db_path='data/edge.db',
              model='openrouter/owl-alpha',
              max_articles=30,
          )
          print(f'Analyzed: {stats.scored} scored, {stats.stored} stored, {stats.total_tokens} tokens')
          "

      - name: Detect trends
        run: |
          python3 -c "
          from trends import run_trends
          report = run_trends(db_path='data/edge.db', output_dir='data', min_score=5.0)
          print(f'Trends: {len(report.top_trends)} top, {len(report.emerging)} emerging')
          " || echo "⚠ Trends step failed (non-fatal)"

      - name: Generate FR site
        env:
          EDGE_API_BASE: "http://72.60.187.136:8081"
        run: |
          python3 -c "
          from generator import generate_site
          from pathlib import Path
          stats = generate_site(Path('data/edge.db'), Path('output'), lang='fr', site_url='https://romdmc.github.io/edge')
          print(f'FR: {stats.pages_generated} pages, {stats.articles_indexed} articles, {stats.errors} errors')
          "

      - name: Generate EN site
        env:
          EDGE_API_BASE: "http://72.60.187.136:8081"
        run: |
          python3 -c "
          from generator import generate_site
          from pathlib import Path
          stats = generate_site(Path('data/edge.db'), Path('output/en'), lang='en', site_url='https://romdmc.github.io/edge')
          print(f'EN: {stats.pages_generated} pages, {stats.articles_indexed} articles')
          "

      - name: Prepare GitHub Pages artifact
        run: |
          mkdir -p _site
          # Copy FR site (root)
          cp -r output/. _site/
          # Copy EN site (subfolder)
          cp -r output/en/. _site/en/
          # Copy static assets
          cp -r static/. _site/static/
          cp -r static/. _site/en/static/
          # Copy templates (login, register, newsletter)
          cp templates/login.html _site/ 2>/dev/null || true
          cp templates/register.html _site/ 2>/dev/null || true
          cp templates/newsletter_subscribe.html _site/ 2>/dev/null || true
          cp templates/newsletter_unsubscribe.html _site/ 2>/dev/null || true
          # .nojekyll to disable Jekyll processing
          touch _site/.nojekyll
          # Fix permissions
          find _site -type f -exec chmod 644 {} \;
          find _site -type d -exec chmod 755 {} \;
          echo "Files: $(find _site -type f | wc -l)"
          echo "Size: $(du -sh _site/ | cut -f1)"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
