name: Deploy EDGE

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'  # Daily at 6am UTC

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install jinja2 pyyaml

      - name: Run pipeline
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          export OPENROUTER_API_KEY
          bash run.sh

      - name: Prepare Pages
        run: |
          mkdir -p _site
          cp -r output/* _site/
          cp templates/login.html templates/register.html templates/newsletter_subscribe.html templates/newsletter_unsubscribe.html _site/
          cp -r static _site/
          find _site -type f -exec chmod 644 {} \;

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
