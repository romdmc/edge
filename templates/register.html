{% extends "base.html" %}
{% block title %}EDGE — {{ t('register_title') }}{% endblock %}

{% block content %}
<div class="auth-page" style="max-width:420px;margin:2rem auto;">
  <h1 style="font-size:1.4rem;font-weight:700;margin-bottom:1.2rem;color:var(--fg);">
    {{ t('register_title') }}
  </h1>

  <div id="auth-message" class="auth-message" style="display:none;padding:0.7rem 1rem;border-radius:var(--radius);margin-bottom:1rem;font-size:0.88rem;"></div>

  <form id="register-form" onsubmit="return doRegister(event)">
    <div style="margin-bottom:1rem;">
      <label for="display_name" style="display:block;font-size:0.82rem;font-weight:600;color:var(--fg-dim);margin-bottom:0.3rem;">
        {{ t('display_name_label') }}
      </label>
      <input type="text" id="display_name" name="display_name" required
             style="width:100%;padding:0.6rem 0.8rem;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg-card);color:var(--fg);font-size:0.92rem;"
             onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'">
    </div>
    <div style="margin-bottom:1rem;">
      <label for="email" style="display:block;font-size:0.82rem;font-weight:600;color:var(--fg-dim);margin-bottom:0.3rem;">
        {{ t('email_label') }}
      </label>
      <input type="email" id="email" name="email" required
             style="width:100%;padding:0.6rem 0.8rem;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg-card);color:var(--fg);font-size:0.92rem;"
             onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'">
    </div>
    <div style="margin-bottom:1rem;">
      <label for="password" style="display:block;font-size:0.82rem;font-weight:600;color:var(--fg-dim);margin-bottom:0.3rem;">
        {{ t('password_label') }}
      </label>
      <input type="password" id="password" name="password" required minlength="6"
             style="width:100%;padding:0.6rem 0.8rem;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg-card);color:var(--fg);font-size:0.92rem;"
             onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'">
    </div>
    <div style="margin-bottom:1.2rem;">
      <label for="password_confirm" style="display:block;font-size:0.82rem;font-weight:600;color:var(--fg-dim);margin-bottom:0.3rem;">
        {{ t('password_confirm_label') }}
      </label>
      <input type="password" id="password_confirm" name="password_confirm" required minlength="6"
             style="width:100%;padding:0.6rem 0.8rem;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg-card);color:var(--fg);font-size:0.92rem;"
             onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'">
    </div>
    <button type="submit"
            style="width:100%;padding:0.65rem;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:0.92rem;font-weight:600;cursor:pointer;"
            onmouseover="this.style.background='var(--accent-dim)'" onmouseout="this.style.background='var(--accent)'">
      {{ t('register_btn') }}
    </button>
  </form>

  <p style="margin-top:1.2rem;text-align:center;font-size:0.85rem;color:var(--fg-dim);">
    {{ t('register_has_account') }} ? <a href="{{ site_url }}/login.html">{{ t('login_btn') }}</a>
  </p>
</div>

<script>
// ===== Local Auth System (localStorage + SHA-256) =====
var DB_KEY = 'edge_users';

function getUsers() {
  try { return JSON.parse(localStorage.getItem(DB_KEY) || '{}'); } catch(e) { return {}; }
}
function saveUsers(u) { localStorage.setItem(DB_KEY, JSON.stringify(u)); }

async function hashPassword(password, salt) {
  var data = new TextEncoder().encode(salt + password);
  var hash = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(hash)).map(function(b){ return b.toString(16).padStart(2,'0'); }).join('');
}

function genSalt() {
  var arr = new Uint8Array(16);
  crypto.getRandomValues(arr);
  return Array.from(arr).map(function(b){ return b.toString(16).padStart(2,'0'); }).join('');
}

function showAuthMessage(msg, isError) {
  var el = document.getElementById('auth-message');
  el.textContent = msg;
  el.style.display = 'block';
  el.style.background = isError ? 'rgba(244,67,54,.15)' : 'rgba(76,175,80,.15)';
  el.style.color = isError ? '#f44336' : 'var(--green)';
  el.style.border = '1px solid ' + (isError ? 'rgba(244,67,54,.3)' : 'rgba(76,175,80,.3)');
}

async function doRegister(e) {
  e.preventDefault();
  var displayName = document.getElementById('display_name').value.trim();
  var email = document.getElementById('email').value.trim().toLowerCase();
  var password = document.getElementById('password').value;
  var passwordConfirm = document.getElementById('password_confirm').value;

  if (password !== passwordConfirm) {
    showAuthMessage('Les mots de passe ne correspondent pas.', true);
    return false;
  }
  if (password.length < 6) {
    showAuthMessage('Le mot de passe doit faire au moins 6 caractères.', true);
    return false;
  }

  var users = getUsers();
  if (users[email]) {
    showAuthMessage('Un compte avec cet email existe déjà.', true);
    return false;
  }

  var salt = genSalt();
  var hash = await hashPassword(password, salt);
  var isFirst = Object.keys(users).length === 0;

  users[email] = {
    display_name: displayName,
    email: email,
    salt: salt,
    hash: hash,
    role: isFirst ? 'admin' : 'user',
    created_at: new Date().toISOString()
  };
  saveUsers(users);

  showAuthMessage('Inscription réussie ! Redirection...', false);
  setTimeout(function(){ window.location.href = '{{ site_url }}/login.html'; }, 1200);
  return false;
}
</script>
{% endblock %}
